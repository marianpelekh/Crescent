name: crescent
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_svg: ^2.0.3
  flutter_inner_shadow: 0.0.1
  shelf: ^1.3.0
  shelf_router: ^1.0.0
  shelf_static: ^1.0.0
  shelf_plus: ^1.0.0
  shelf_web_socket: ^1.0.0
  web_socket_channel: ^2.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/fonts/
    - assets/CrescentLongLogo.svg

  fonts:
    - family: Jomolhari
      fonts:
        - asset: assets/fonts/Jomolhari-Regular.ttf
    - family: JosefinSans
      fonts:
        - asset: assets/fonts/JosefinSans.ttf
