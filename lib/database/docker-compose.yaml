services:
  mariadb:
    image: mariadb:latest
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: mH04122005Op
      MYSQL_DATABASE: crescent_db
      MYSQL_USER: TheSun
      MYSQL_PASSWORD: 1q2w3e098
    ports:
      - "3306:3306"
    volumes:
      - ./mariadb:/var/lib/mysql
    networks:
      - internal

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    restart: always
    ports:
      - "8080:80"
    environment:
      PMA_HOST: mariadb
      PMA_USER: TheSun
      PMA_PASSWORD: 1q2w3e098
    networks:
        - internal

networks:
    internal:
        driver: bridge

volumes:
  db_data: